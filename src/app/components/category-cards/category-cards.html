<div class="container my-5">
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let cat of categories">
      <div class="card h-100 shadow-sm border-0 card-animate">
        
        <div class="img-wrapper">
          <img [src]="cat.image" class="card-img-top custom-card-img" [alt]="cat.name">
          <div class="shine-effect"></div>
        </div>
        
        <div class="card-body text-center d-flex flex-column">
          <h5 class="card-title fw-bold">{{ cat.name }}</h5>
          <p class="text-muted small">Calidad y resistencia en aluminio</p>
          
            <a [routerLink]="['/categoria', cat.id, cat.name]" class="btn btn-primary mt-auto btn-animate">
              Ver modelos
            </a>
        </div>
      </div>
    </div>
  </div>
</div>
